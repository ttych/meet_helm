---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: clinic-deploy
  labels:
    myversion: "1"
spec:
  replicas: {{ .Values.replicas }}
  selector:
    matchLabels:
      app: clinic-front
  template:
    metadata:
      labels:
        app: clinic-front
    spec: # specification du pod
      imagePullSecrets:
        - name: ghcr-secret
      containers:
        - name: springboot
          image: "{{ .Values.image.repository }}:{{ .Values.image.tag | default .Chart.AppVersion }}"

          # 1. On injecte la variable. Si vide, on force "/" pour Spring Boot
          env:
            - name: SERVER_SERVLET_CONTEXT_PATH
              value: {{ .Values.app.contextPath | default "/" | quote }}

          # 2. Les sondes se concatènent parfaitement grâce à notre gestion du vide
          startupProbe:
            httpGet:
              path: {{ .Values.app.contextPath }}/actuator/health/readiness
              port: 8080
            initialDelaySeconds: 5
            periodSeconds: 3
            failureThreshold: 30
            timeoutSeconds: 2

          livenessProbe:
            httpGet:
              path: {{ .Values.app.contextPath }}/actuator/health/liveness
              port: 8080
            periodSeconds: 10
            timeoutSeconds: 1

          readinessProbe:
            httpGet:
              path: {{ .Values.app.contextPath }}/actuator/health/readiness
              port: 8080
            periodSeconds: 10
            timeoutSeconds: 1
